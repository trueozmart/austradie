<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="45"/>
    </clipPath>
  </defs>

  <circle cx="50" cy="50" r="48" fill="#ffffff"/>
  <circle cx="50" cy="50" r="45" fill="#1a3266"/>

  <g clip-path="url(#circle)">
    <!-- Union Jack (upper-left quadrant) -->
    <g>
      <rect x="5" y="5" width="47" height="47" fill="#1a3266"/>
      <!-- white diagonals -->
      <path d="M5 5 L52 52 M52 5 L5 52" stroke="#ffffff" stroke-width="8"/>
      <!-- red diagonals -->
      <path d="M5 5 L52 52" stroke="#c8102e" stroke-width="3"/>
      <path d="M52 5 L5 52" stroke="#c8102e" stroke-width="3"/>
      <!-- white cross -->
      <path d="M28.5 5 V52 M5 28.5 H52" stroke="#ffffff" stroke-width="12"/>
      <!-- red cross -->
      <path d="M28.5 5 V52 M5 28.5 H52" stroke="#c8102e" stroke-width="6"/>
    </g>

    <!-- Southern Cross stars -->
    <g fill="#ffffff">
      <polygon points="0,-7 1.6,-2.2 6.7,-2.2 2.6,0.8 4.1,5.7 0,2.7 -4.1,5.7 -2.6,0.8 -6.7,-2.2 -1.6,-2.2" transform="translate(78,38)"/>
      <polygon points="0,-6 1.4,-1.9 5.7,-1.9 2.2,0.7 3.5,4.9 0,2.3 -3.5,4.9 -2.2,0.7 -5.7,-1.9 -1.4,-1.9" transform="translate(68,58)"/>
      <polygon points="0,-4.5 1.1,-1.4 4.3,-1.4 1.7,0.5 2.6,3.6 0,1.7 -2.6,3.6 -1.7,0.5 -4.3,-1.4 -1.1,-1.4" transform="translate(53,68)"/>
      <polygon points="0,-7 1.6,-2.2 6.7,-2.2 2.6,0.8 4.1,5.7 0,2.7 -4.1,5.7 -2.6,0.8 -6.7,-2.2 -1.6,-2.2" transform="translate(36,75)"/>
      <polygon points="0,-6 1.4,-1.9 5.7,-1.9 2.2,0.7 3.5,4.9 0,2.3 -3.5,4.9 -2.2,0.7 -5.7,-1.9 -1.4,-1.9" transform="translate(80,80)"/>
    </g>
  </g>
</svg>
